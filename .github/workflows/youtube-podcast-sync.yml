name: YouTube + Podcast Sync

on:
  schedule:
    # 9h, 15h, 20h Vietnam time (UTC+7) = 02:00, 08:00, 13:00 UTC
    # Note: GH Actions cron có thể delay tới 15 phút
    - cron: "0 2,8,13 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      - name: Start WARP in proxy mode
        run: |
          sleep 3
          sudo systemctl is-active warp-svc || sudo systemctl start warp-svc
          sleep 2

          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos proxy port 40000
          warp-cli --accept-tos connect

          for i in {1..15}; do
            status=$(warp-cli --accept-tos status || true)
            echo "warp status: $status"
            echo "$status" | grep -q "Connected" && break
            sleep 2
          done

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.YT_PODCAST_DATABASE_ID }}
          WARP_PROXY: socks5h://127.0.0.1:40000
        run: python youtube-podcast-sync.py
